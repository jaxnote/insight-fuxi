name: CI

on:
  pull_request:
    branches: [main, master, feature-*]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "18"
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────
  # Job 1: 前端 Build + 类型检查
  # ──────────────────────────────────────────────
  frontend-build:
    name: "Frontend · Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bgm-monolith/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: bgm-monolith/frontend/package-lock.json

      - run: npm ci
      - run: npm run build

  # ──────────────────────────────────────────────
  # Job 2: 前端测试 + 覆盖率
  # ──────────────────────────────────────────────
  frontend-test:
    name: "Frontend · Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bgm-monolith/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: bgm-monolith/frontend/package-lock.json

      - run: npm ci

      - name: Run tests
        run: |
          npx vitest run \
            --coverage \
            --coverage.reportsDirectory=../reports/frontend/coverage \
            --reporter=junit --outputFile=../reports/frontend/junit.xml \
            --reporter=default

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-reports
          path: |
            bgm-monolith/reports/frontend/junit.xml
            bgm-monolith/reports/frontend/coverage/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Job 3: 后端测试 + 覆盖率
  # ──────────────────────────────────────────────
  backend-test:
    name: "Backend · Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bgm-monolith/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: bgm-monolith/backend/pyproject.toml

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest ../tests/ -v \
            --cov=app \
            --cov-report=html:../reports/backend/coverage \
            --cov-report=term-missing \
            --junitxml=../reports/backend/junit.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-reports
          path: |
            bgm-monolith/reports/backend/junit.xml
            bgm-monolith/reports/backend/coverage/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Job 4: 回归门禁（仅 PR 合并到 main/master 时）
  # ──────────────────────────────────────────────
  regression:
    name: "Regression Gate"
    if: github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'master')
    needs: [frontend-build, frontend-test, backend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: bgm-monolith/frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: bgm-monolith/backend/pyproject.toml

      - name: Install all dependencies
        run: |
          cd bgm-monolith/backend && pip install -e ".[dev]"
          cd ../frontend && npm ci

      - name: Backend regression
        working-directory: bgm-monolith/backend
        run: pytest ../tests/ -v -k "regression"

      - name: Frontend regression
        working-directory: bgm-monolith/frontend
        run: npx vitest run -t regression

  # ──────────────────────────────────────────────
  # Job 5: 安全扫描
  # ──────────────────────────────────────────────
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: bgm-monolith/backend/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: bgm-monolith/frontend/package-lock.json

      - name: Install Python dependencies
        working-directory: bgm-monolith/backend
        run: |
          pip install -e ".[dev]"
          pip install pip-audit bandit

      - name: "pip-audit: Python dependency vulnerabilities"
        run: pip-audit

      - name: "npm audit: Node dependency vulnerabilities"
        working-directory: bgm-monolith/frontend
        run: npm audit --audit-level=high || true

      - name: "bandit: Python SAST"
        working-directory: bgm-monolith/backend
        run: bandit -r app/ -f json -o ../reports/bandit.json --exit-zero && bandit -r app/ -ll

      - name: "gitleaks: Secret detection"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bgm-monolith/reports/bandit.json
          retention-days: 14

  # ──────────────────────────────────────────────
  # Job 6: CI 汇总（用于 Branch Protection required check）
  # ──────────────────────────────────────────────
  ci-pass:
    name: "CI Pass"
    if: always()
    needs: [frontend-build, frontend-test, backend-test, security]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.frontend-build.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-test.result }}" != "success" ]] || \
             [[ "${{ needs.backend-test.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]]; then
            echo "❌ CI failed"
            echo "  frontend-build: ${{ needs.frontend-build.result }}"
            echo "  frontend-test:  ${{ needs.frontend-test.result }}"
            echo "  backend-test:   ${{ needs.backend-test.result }}"
            echo "  security:       ${{ needs.security.result }}"
            exit 1
          fi
          echo "✅ All CI checks passed"
