version: "3.9"

# ── 使用宿主机本地 MySQL（mysql -u root -p000000asd）──────────────────────────
# Mac Docker Desktop 通过 host.docker.internal 访问宿主机端口

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+aiomysql://root:000000asd@host.docker.internal:3306/insight_fuxi
      - CONVERSATION_BACKEND=mysql
      - FILE_BACKEND=local
      - STORAGE_BASE_PATH=/data/storage
      - DEBUG=false
    volumes:
      - backend-storage:/data/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux 兼容；Mac 自动支持
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-storage:
